plugins {
	id 'crnk.java-library'
}

dependencies {

	testImplementation platform('org.springframework.boot:spring-boot-dependencies:1.5.8.RELEASE')

	implementation project(':crnk-core')
	compileOnly project(':crnk-reactive')
	compileOnly 'javax.servlet:javax.servlet-api'
	compileOnly 'org.slf4j:slf4j-api'

	testImplementation project(':crnk-reactive')
	testImplementation project(':crnk-test')
	testImplementation project(':crnk-client')
	testImplementation 'javax.servlet:javax.servlet-api'
	testImplementation 'net.javacrumbs.json-unit:json-unit'
	testImplementation 'org.reflections:reflections'
	testImplementation 'org.springframework.boot:spring-boot-starter-web'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
}
