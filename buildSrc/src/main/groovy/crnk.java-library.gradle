plugins {
	id 'java-library'
	id 'crnk.java'
	id 'crnk.publish'
}

tasks.register('sourcesJar', Jar) {
	from sourceSets.main.allSource
	archiveClassifier = 'sources'
}

tasks.register('javadocJar', Jar) {
	dependsOn javadoc
	from javadoc.destinationDir
	archiveClassifier = 'javadoc'
}

tasks.withType(Javadoc) {
	options.addStringOption('Xdoclint:none', '-quiet')
}

publishing {
	publications {
		maven(MavenPublication) {
			from components.java
			artifact tasks.sourcesJar
			artifact tasks.javadocJar
			pom {
				// Removes dependencyManagement element
 				withXml {
					def root = asNode()
					def nodes = root["dependencyManagement"]
					if (!nodes.isEmpty()) {
						root.remove(nodes.first())
					}
				}
			}
			versionMapping {
				// compile
				usage('java-api') {
					fromResolutionOf('runtimeClasspath')
				}
				// runtime
				usage('java-runtime') {
					fromResolutionResult()
				}
			}
		}
	}
}

// A temporary workaround
// Incorrect eclipse classpath when using compileOnly project dependencies and the java-library plugin
// https://github.com/gradle/gradle/issues/32284
sourceSets.configureEach {
    def eclipseCompileClasspath = configurations.resolvable(getTaskName(null, "eclipseCompileClasspath")) {
        def compileClasspath = configurations.getByName(getCompileClasspathConfigurationName())
            extendsFrom(compileClasspath)
            attributes {
                compileClasspath.attributes.keySet().each { key ->
                attribute((Attribute) key, compileClasspath.attributes.getAttribute(key))
            }
            attribute(LibraryElements.LIBRARY_ELEMENTS_ATTRIBUTE, objects.named(LibraryElements, LibraryElements.JAR))
        }
    }
    eclipse {
        classpath {
            plusConfigurations.add(eclipseCompileClasspath.get())
        }
    }
}
