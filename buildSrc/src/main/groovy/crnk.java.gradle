plugins {
	id 'java'
	id 'eclipse'
}

java {
	sourceCompatibility = 1.8
	targetCompatibility = 1.8
}

test {
	useJUnitPlatform()
	maxParallelForks = 1

	testLogging {
		exceptionFormat = 'full'
	}
}

configurations.all {
	exclude group: "org.slf4j", module: "slf4j-log4j12"
	exclude group: "log4j", module: "log4j"
}
